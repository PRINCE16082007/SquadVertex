<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Security System</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030504;
      --text-green: #00ff41;
      --text-red: #ff003c;
      --text-cyan: #00e5ff;
      --text-dim: #435b54;
      --highlight: #ffee00;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      color: var(--text-green);
      font-family: 'Share Tech Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* 🌧️ Dense Matrix Canvas */
    #matrixCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.6; /* Increased visibility */
    }

    /* 🖥️ Terminal Container - Lighter overlay for visibility */
    .terminal-container {
      width: 90%;
      max-width: 750px;
      height: 85vh;
      padding: 30px;
      border: 1px solid rgba(0, 255, 65, 0.25);
      border-radius: 8px;
      /* Adjusted for better background visibility */
      background: rgba(3, 8, 5, 0.55); 
      box-shadow: inset 0 0 30px rgba(0, 255, 65, 0.1), 0 10px 50px rgba(0,0,0,0.8);
      position: relative;
      z-index: 10;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
    }

    .scan-line {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(0, 255, 65, 0.5);
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.8);
      animation: scan 3.5s linear infinite;
      pointer-events: none;
      z-index: 20;
    }

    @keyframes scan {
      0% { top: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    #output-wrapper {
      flex-grow: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 20px;
    }
    
    #output-wrapper::-webkit-scrollbar { display: none; }
    #output-wrapper { -ms-overflow-style: none; scrollbar-width: none; }

    .line {
      min-height: 20px;
      margin-bottom: 6px;
      font-size: 1.05rem;
      line-height: 1.4;
      word-wrap: break-word;
      text-shadow: 0 0 3px rgba(0, 255, 65, 0.3);
    }

    .red { color: var(--text-red); text-shadow: 0 0 8px rgba(255, 0, 60, 0.8); font-weight: bold; }
    .dim { color: var(--text-dim); text-shadow: none; }
    .cyan { color: var(--text-cyan); text-shadow: 0 0 8px rgba(0, 229, 255, 0.8); font-weight: bold; }
    
    .yellow-mark { 
      background: var(--highlight); 
      color: #000; 
      padding: 0 6px; 
      font-weight: bold; 
      border-radius: 3px;
      text-shadow: none;
      box-shadow: 0 0 15px rgba(255, 238, 0, 0.9);
    }
    
    /* Input Field */
    .input-wrapper {
      display: none;
      margin-top: 15px;
      align-items: center;
    }
    .input-wrapper.active { display: flex; }
    .prompt { margin-right: 10px; font-weight: bold; }
    
    input {
      background: transparent;
      border: none;
      color: var(--text-green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.15rem;
      outline: none;
      width: 100%;
      text-shadow: 0 0 8px rgba(0, 255, 65, 0.6);
      font-weight: bold;
    }

    /* 🚨 Big Status Overlays */
    .big-status {
      font-size: 3.5rem;
      text-align: center;
      font-weight: bold;
      opacity: 0;
      letter-spacing: 4px;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(5,5,5,0.95);
      padding: 25px 50px;
      z-index: 100;
      pointer-events: none;
    }

    /* 💥 The RGB Glitch Shatter */
    .glitch-shatter {
      animation: insaneGlitch 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      border: 3px solid var(--text-red);
      box-shadow: 0 0 40px rgba(255,0,60,0.6);
      color: var(--text-red);
    }

    @keyframes insaneGlitch {
      0% { transform: translate(-50%, -50%); opacity: 1; filter: none; }
      10% { transform: translate(-52%, -48%) skewX(-30deg); text-shadow: -6px 0 cyan, 6px 0 yellow; opacity: 0.9; }
      20% { transform: translate(-48%, -50%) skewX(20deg); text-shadow: 6px 0 cyan, -6px 0 yellow; opacity: 0.9; }
      30% { transform: translate(-50%, -45%) scaleY(1.5); text-shadow: -10px 0 cyan, 10px 0 red; filter: blur(1px); }
      40% { transform: translate(-55%, -55%) skewX(-10deg); opacity: 0.7; }
      50% { transform: translate(-45%, -50%) skewX(45deg) scaleY(0.2); letter-spacing: 25px; filter: blur(2px); }
      60% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.3; }
      100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; filter: blur(20px); }
    }

    /* ⚡ The Neon Flicker On */
    .force-grant {
      color: #fff;
      border: 3px solid var(--text-green);
      animation: neonFlicker 1.5s forwards;
    }

    @keyframes neonFlicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        opacity: 1;
        text-shadow: 0 0 10px var(--text-green), 0 0 20px var(--text-green), 0 0 50px var(--text-green);
        box-shadow: 0 0 20px var(--text-green), inset 0 0 20px var(--text-green);
        transform: translate(-50%, -50%) scale(1);
      }
      20%, 24%, 55% {
        opacity: 0.2;
        text-shadow: none;
        box-shadow: none;
        transform: translate(-50%, -50%) scale(0.98);
      }
    }
  </style>
</head>
<body>

  <canvas id="matrixCanvas"></canvas>

  <div class="terminal-container" id="terminal">
    <div class="scan-line"></div>
    <div id="output-wrapper">
      <div id="output"></div>
      
      <div class="input-wrapper" id="inputWrapper">
        <span class="prompt">></span>
        <input type="text" id="nameInput" autocomplete="off" spellcheck="false" autofocus>
      </div>
    </div>
    
    <div class="big-status red" id="bigStatus">ACCESS DENIED</div>
  </div>

  <script>
    // --- 🌧️ Ultimate Matrix Canvas Effect ---
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレゲゼデベペオォコソトノホモヨョロゴゾドボポヴッン';
    const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const nums = '0123456789';
    const alphabet = katakana + latin + nums;

    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const rainDrops = [];
    for( let x = 0; x < columns; x++ ) { rainDrops[x] = 1; }

    function drawMatrix() {
      // Create that trailing fade effect
      ctx.fillStyle = 'rgba(3, 5, 4, 0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#0F0'; 
      ctx.font = fontSize + 'px monospace';

      for(let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        // Randomly make some characters white for depth
        if(Math.random() > 0.95) {
          ctx.fillStyle = '#FFF';
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#FFF';
        } else {
          ctx.fillStyle = '#0F0';
          ctx.shadowBlur = 0;
        }

        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
        
        if(rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975){
          rainDrops[i] = 0;
        }
        rainDrops[i]++;
      }
    }
    setInterval(drawMatrix, 40);

    // --- 💻 Terminal Logic ---
    const output = document.getElementById('output');
    const outputWrapper = document.getElementById('output-wrapper');
    const inputWrapper = document.getElementById('inputWrapper');
    const nameInput = document.getElementById('nameInput');
    const bigStatus = document.getElementById('bigStatus');

    // 💡 Add her nicknames here
    const allowedNames = ['avika', 'piya', 'princess', 'panda', 'cutie', 'queen'];

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    function scrollToBottom() {
      outputWrapper.scrollTop = outputWrapper.scrollHeight;
    }

    async function typeText(text, colorClass = '', speed = 25) {
      const line = document.createElement('div');
      line.className = `line ${colorClass}`;
      output.appendChild(line);
      
      for (let i = 0; i < text.length; i++) {
        line.innerHTML += text.charAt(i);
        scrollToBottom();
        await sleep(speed);
      }
      return line;
    }

    async function printFastLine(text, colorClass = '') {
      const line = document.createElement('div');
      line.className = `line ${colorClass}`;
      line.innerHTML = text;
      output.appendChild(line);
      scrollToBottom();
      await sleep(15); 
    }

    async function initSequence() {
      await sleep(800);
      await typeText("Global Security Protocol v4.0.1 initialized...", "dim");
      await typeText("Establishing secure connection... OK", "dim");
      await sleep(400);
      await typeText("Awaiting user identification input:");
      inputWrapper.classList.add('active');
      nameInput.focus();
    }

    nameInput.addEventListener('keypress', async function(e) {
      if (e.key === 'Enter') {
        const val = this.value.trim().toLowerCase();
        if(!val) return;

        inputWrapper.classList.remove('active');
        this.disabled = true;

        await typeText(`> ${this.value}`, "dim");
        await sleep(300);
        await typeText(`Initiating heavy DB scan for entity [${val}]...`, "");
        await sleep(400);

        // 🔍 EXTENDED DB SCAN DRAMA (Longer and denser)
        let delayCount = 10;
        for(let i=0; i<38; i++) {
          const randHex = "0x" + Math.floor(Math.random()*16777215).toString(16).toUpperCase().padStart(6, '0');
          const node = Math.floor(Math.random() * 9999);
          // Speed changes dynamically to simulate heavy processing
          delayCount = Math.max(5, delayCount + (Math.random() > 0.5 ? 8 : -5)); 
          await printFastLine(`Scanning global_db/sector_${node}/id_${randHex} ... <span class="dim">FAILED</span>`);
          await sleep(delayCount);
        }
        
        await sleep(500);
        await typeText("CRITICAL ERROR: ENTITY NOT FOUND IN PUBLIC MAINFRAME.", "red");
        await typeText("Access privileges instantly revoked.", "red");
        await sleep(400);
        
        // Show Denied Overly
        bigStatus.classList.remove('glitch-shatter', 'force-grant');
        bigStatus.innerText = "ACCESS DENIED";
        bigStatus.style.opacity = '1';
        
        if (allowedNames.includes(val)) {
          await sleep(1800);
          
          await typeText("Wait...", "");
          await sleep(800);
          await typeText("Anomaly detected in secure partition 0x99.", "dim");
          await typeText("Bypassing standard DB... Running Deep Scan Protocol...", "dim");
          await sleep(1200);

          // Deep Vault Structure
          await printFastLine(`Accessing Root...`, "dim");
          await sleep(300);
          await printFastLine(`>> Prince_Core/`, "dim");
          await sleep(300);
          await printFastLine(`>>>> VIP_Clearance/`, "cyan");
          await sleep(400);
          await printFastLine(`>>>>>> Friends_Sector/`, "cyan");
          await sleep(500);
          await printFastLine(`>>>>>>>> Heart_Drive_Encrypted/`, "cyan");
          await sleep(800);
          
          await typeText("Match Found in highly classified vault!", "cyan", 20);
          await sleep(500);

          let aliasesHtml = "[ ";
          allowedNames.forEach((name, index) => {
            if(name === val) {
              aliasesHtml += `<span class="yellow-mark">${name}</span>`;
            } else {
              aliasesHtml += name;
            }
            if(index < allowedNames.length - 1) aliasesHtml += " | ";
          });
          aliasesHtml += " ]";

          await typeText("Registered Aliases: ", "");
          const aliasLine = document.createElement('div');
          aliasLine.className = 'line';
          aliasLine.innerHTML = aliasesHtml;
          output.appendChild(aliasLine);
          scrollToBottom();

          await sleep(1000);

          // ✨ THE UNIQUE IDEA: Threat Scan
          await typeText("Running biometric profile check...", "dim");
          await sleep(800);
          await typeText("Scanning emotional threat level...", "");
          await sleep(1200);
          await typeText("Threat Level: CRITICAL ⚠️", "yellow-mark");
          await sleep(800);
          await typeText("Reason: Smile is dangerously cute.", "cyan");
          await sleep(600);
          await typeText("Protocol: Protect at all costs.", "cyan");

          await sleep(1200);
          await typeText("Oh shit.", "red");
          await sleep(500);
          await typeText(`My bad! I didn't realize it was you. 🙇‍♂️`);
          await sleep(500);
          await typeText("Breaking security walls... Stand by...", "dim");
          
          await sleep(1500);
          
          // 💥 Glitch Shatter Explode
          bigStatus.classList.add('glitch-shatter');
          
          await sleep(900);
          
          // ⚡ Neon Force Grant
          bigStatus.className = 'big-status force-grant';
          bigStatus.innerText = "ACCESS GRANTED";
          
          await sleep(1500);
          await typeText("Welcome in. Opening your gift...", "dim");
          
          // 🔗 Redirect
          setTimeout(() => {
            window.location.href = "penguin_game.html"; 
          }, 2500);

        } else {
          await sleep(1500);
          await typeText("Intruder Alert. System locked. Deploying countermeasures...", "red");
          await sleep(2500);
          location.reload(); 
        }
      }
    });

    initSequence();
  </script>
</body>
</html>
