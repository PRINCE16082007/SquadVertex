<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Do Not Tap</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink-glow: #ff1493;
      --pink-soft: #ff69b4;
      --pink-light: #ffb6c1;
      --bg-dark: #050505;
      --ease-smooth: cubic-bezier(0.25, 1, 0.5, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-dark);
      font-family: 'Poppins', system-ui, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* 🌸 Advanced Background Animation */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      animation: float 14s infinite ease-in-out;
      pointer-events: none;
    }
    .orb-1 { width: 420px; height: 420px; background: radial-gradient(circle, var(--pink-glow), var(--pink-soft)); top: -12%; left: -10%; animation-delay: 0s; }
    .orb-2 { width: 360px; height: 360px; background: radial-gradient(circle, #c70066, var(--pink-light)); bottom: -12%; right: -8%; animation-delay: -5s; }
    .orb-3 { width: 280px; height: 280px; background: radial-gradient(circle, var(--pink-soft), #0a0a0a); top: 45%; left: 35%; animation-delay: -9s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(35px, -45px) scale(1.08); }
      66% { transform: translate(-25px, 25px) scale(0.96); }
    }

    /* ✨ Subtle Sparkles */
    .sparkle {      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--pink-light);
      border-radius: 50%;
      opacity: 0;
      animation: sparkle 3.5s infinite ease-in-out;
      pointer-events: none;
      box-shadow: 0 0 6px var(--pink-soft);
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0.5) translateY(0); }
      50% { opacity: 0.7; transform: scale(1.2) translateY(-12px); }
    }

    /* 🪞 Glass Card */
    .glass-card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 105, 180, 0.25);
      border-radius: 32px;
      padding: 64px 56px;
      box-shadow: 
        0 30px 80px rgba(255, 20, 147, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      transition: opacity 1.2s var(--ease-smooth), transform 1.2s var(--ease-smooth);
    }

    /* 🔘 Premium Button */
    .tap-btn {
      position: relative;
      background: rgba(255, 105, 180, 0.12);
      border: 1px solid rgba(255, 105, 180, 0.35);
      padding: 18px 42px;
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--pink-light);
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.45s var(--ease-smooth);
      overflow: hidden;
      outline: none;
      letter-spacing: 0.3px;
    }
    .tap-btn::before {
      content: '';
      position: absolute;      inset: -2px;
      background: linear-gradient(135deg, var(--pink-glow), var(--pink-soft), var(--pink-light));
      border-radius: 60px;
      z-index: -1;
      opacity: 0.3;
      transition: opacity 0.4s ease, transform 0.4s var(--ease-smooth);
    }
    .tap-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(255, 20, 147, 0.35);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.4);
    }
    .tap-btn:hover::before { opacity: 0.6; transform: scale(1.05); }
    .tap-btn:active { transform: scale(0.97) translateY(0); }

    /* 📝 Smooth Text Transition */
    .btn-text {
      display: block;
      transition: opacity 0.4s var(--ease-smooth), transform 0.4s var(--ease-smooth);
    }
    .btn-text.out { opacity: 0; transform: translateY(-8px) scale(0.96); }

    /* 🌫️ Fade Out State */
    .glass-card.fade-out {
      opacity: 0;
      transform: scale(0.94) translateY(12px);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Background Elements -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- Glass Container -->
  <div class="glass-card" id="mainCard">
    <button class="tap-btn" id="actionBtn">
      <span class="btn-text" id="btnText">Do Not Tap ⚠️</span>
    </button>
  </div>

  <script>
    // Generate subtle sparkles
    const body = document.body;
    for(let i = 0; i < 18; i++) {
      const s = document.createElement('div');      s.className = 'sparkle';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 3.5 + 's';
      s.style.animationDuration = (2.5 + Math.random() * 2) + 's';
      body.appendChild(s);
    }

    // Interaction Logic
    const btn = document.getElementById('actionBtn');
    const textEl = document.getElementById('btnText');
    const card = document.getElementById('mainCard');
    let tapCount = 0;
    let isAnimating = false;

    const messages = [
      "I told you not to tap! 🤨",
      "Alright, you win. Here you go... 🙄"
    ];

    function smoothTextSwap(newText) {
      if (isAnimating) return;
      isAnimating = true;
      
      textEl.classList.add('out');
      setTimeout(() => {
        textEl.textContent = newText;
        textEl.classList.remove('out');
        isAnimating = false;
      }, 400); // Matches CSS transition duration
    }

    btn.addEventListener('click', () => {
      if (tapCount === 0) {
        tapCount++;
        smoothTextSwap(messages[0]);
      } else if (tapCount === 1) {
        tapCount++;
        smoothTextSwap(messages[1]);
        
        // Auto fade & redirect after a graceful pause
        setTimeout(() => {
          card.classList.add('fade-out');
          setTimeout(() => {
            // 🔗 REPLACE THIS URL WITH YOUR DESTINATION
            window.location.href = "https://www.squadvertex.great-site.net/special-gift/security_barrier.html";
          }, 1200);
        }, 1400);
      }
    });  </script>
</body>
</html>
