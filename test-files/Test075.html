<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SquadVertex Cyber Matrix - EXELIS Edition</title>
  <style>
    /* Global Reset & Deep Space Black */
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: #030303; color: #0f0;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden; user-select: none;
    }

    /* Matrix Canvas Background */
    canvas {
      display: block; position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; opacity: 0.25; 
    }

    /* CRT Scanline & Screen Flicker Effect */
    .crt::before {
      content: " "; display: block; position: absolute; inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
    }
    .crt::after {
      content: " "; display: block; position: absolute; inset: 0;
      background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.8) 100%);
      z-index: 101; pointer-events: none;
    }
    @keyframes flicker {
      0% { opacity: 0.95; } 5% { opacity: 0.85; } 10% { opacity: 0.95; }
      15% { opacity: 1; } 100% { opacity: 1; }
    }
    .crt { animation: flicker 0.15s infinite; }

    /* UI Layout Containers */
    .container {
      position: absolute; z-index: 10; inset: 0;
      display: flex; flex-direction: column;
      text-shadow: 0 0 5px rgba(0, 255, 0, 0.6);
    }

    /* Hacking Header */
    .header {
      text-align: center; padding: 12px; font-size: 22px; font-weight: bold;
      border-bottom: 1px solid #0f0; background: rgba(0, 20, 0, 0.8);
      letter-spacing: 3px; display: flex; justify-content: space-between; align-items: center;
    }
    .header span.exelis { color: #ff0055; text-shadow: 0 0 10px #ff0055; font-size: 18px;}
    .sys-time { font-size: 14px; color: #0f0; }

    /* Main Dashboard Area */
    .dashboard {
      flex: 1; display: flex; flex-direction: row; overflow: hidden;
    }

    /* Left Panel: Terminal (70%) */
    .terminal-panel {
      flex: 7; border-right: 1px dashed #0f0; padding: 15px;
      display: flex; flex-direction: column; justify-content: flex-end;
      overflow-y: hidden; position: relative;
      background: linear-gradient(90deg, rgba(0,20,0,0.4) 0%, transparent 100%);
    }

    .log-line { margin-bottom: 2px; word-break: break-all; font-size: 14px; }
    .log-sys { color: #0f0; }
    .log-warn { color: #ffcc00; text-shadow: 0 0 5px #ffcc00; }
    .log-crit { color: #ff0055; text-shadow: 0 0 5px #ff0055; font-weight: bold; }
    .log-hex { color: #008800; opacity: 0.8; }

    /* Right Panel: Modules (30%) */
    .sidebar-panel {
      flex: 3; padding: 15px; display: flex; flex-direction: column; gap: 20px;
      background: rgba(0, 0, 0, 0.6);
    }

    /* Sidebar Modules Common Style */
    .module {
      border: 1px solid #005500; padding: 10px; position: relative;
      background: rgba(0, 20, 0, 0.5);
    }
    .module-title {
      position: absolute; top: -10px; left: 10px; background: #030303; 
      padding: 0 5px; font-size: 12px; font-weight: bold; color: #00ffaa;
    }

    /* Radar Module */
    .radar-container {
      width: 100%; display: flex; justify-content: center; align-items: center; padding: 10px 0;
    }
    .radar {
      width: 120px; height: 120px; border-radius: 50%;
      border: 1px solid #0f0; position: relative;
      background: 
        linear-gradient(90deg, transparent 49.5%, #005500 49.5%, #005500 50.5%, transparent 50.5%),
        linear-gradient(0deg, transparent 49.5%, #005500 49.5%, #005500 50.5%, transparent 50.5%);
      box-shadow: inset 0 0 20px rgba(0,255,0,0.2);
    }
    .radar-sweep {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 70%, rgba(0, 255, 0, 0.1) 80%, rgba(0, 255, 0, 0.8) 100%);
      animation: sweep 2s linear infinite;
    }
    @keyframes sweep { 100% { transform: rotate(360deg); } }
    .blip {
      width: 4px; height: 4px; background: #ff0055; border-radius: 50%;
      position: absolute; box-shadow: 0 0 5px #ff0055;
      animation: blink 2s infinite;
    }

    /* Hardware Stats Module */
    .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
    .bar-bg { flex: 1; background: #003300; height: 10px; margin: 2px 10px 0 10px; position: relative; }
    .bar-fg { background: #0f0; height: 100%; width: 0%; transition: width 0.2s; }
    .bar-fg.danger { background: #ff0055; box-shadow: 0 0 5px #ff0055; }

    /* Decryption Module */
    .decrypt-box {
      font-size: 15px; letter-spacing: 2px; text-align: center;
      padding: 15px 0; color: #ffcc00; font-weight: bold;
      border: 1px dashed #ffcc00; background: rgba(255,204,0,0.05);
    }

    /* Network Tracking */
    .ip-list { font-size: 12px; line-height: 1.6; color: #00ffaa; }

    /* Footer Signature */
    .signature {
      text-align: right; padding: 5px 15px; font-size: 12px;
      border-top: 1px solid #0f0; background: rgba(0, 0, 0, 0.9);
      display: flex; justify-content: space-between;
    }

  </style>
</head>
<body class="crt">

  <canvas id="matrixCanvas"></canvas>

  <div class="container">
    <div class="header">
      <div>SYS.ID: <span style="color:#0f0;">CREATINE</span></div>
      <div>SQUADVERTEX // <span class="exelis">[EXELIS PROTOCOL]</span></div>
      <div class="sys-time" id="clock">00:00:00</div>
    </div>
    
    <div class="dashboard">
      <div class="terminal-panel" id="terminal"></div>
      
      <div class="sidebar-panel">
        
        <div class="module">
          <div class="module-title">GEO-TRACKING</div>
          <div class="radar-container">
            <div class="radar">
              <div class="radar-sweep"></div>
              <div class="blip" style="top: 30%; left: 60%; animation-delay: 0.5s;"></div>
              <div class="blip" style="top: 70%; left: 40%; animation-delay: 1.2s;"></div>
              <div class="blip" style="top: 50%; left: 20%; animation-delay: 1.8s;"></div>
            </div>
          </div>
        </div>

        <div class="module">
          <div class="module-title">SYS RESOURCES</div>
          <div class="stat-row">
            <span>CPU</span>
            <div class="bar-bg"><div class="bar-fg" id="cpuBar"></div></div>
            <span id="cpuTxt">0%</span>
          </div>
          <div class="stat-row">
            <span>RAM</span>
            <div class="bar-bg"><div class="bar-fg" id="ramBar"></div></div>
            <span id="ramTxt">0%</span>
          </div>
          <div class="stat-row">
            <span>NET</span>
            <div class="bar-bg"><div class="bar-fg" id="netBar" style="background:#00ffaa;"></div></div>
            <span id="netTxt">0%</span>
          </div>
        </div>

        <div class="module">
          <div class="module-title">DECRYPTION ENGINE</div>
          <div class="decrypt-box" id="decryptor">X&H@9!K#Z</div>
          <div style="font-size:10px; text-align:center; margin-top:5px; color:#ff0055;" id="decryptStatus">BRUTE-FORCING...</div>
        </div>

        <div class="module" style="flex: 1;">
          <div class="module-title">ACTIVE NODES</div>
          <div class="ip-list" id="ipNodes"></div>
        </div>

      </div>
    </div>
    
    <div class="signature">
      <span>STATUS: <span style="color:#ff0055; animation: blink 1s infinite;">GHOST MODE SECURED</span></span>
      <span>CTO: PRINCE GAHLOT // UPLINK: STABLE</span>
    </div>
  </div>

  <script>
    "use strict";

    /* ==========================================================
       1. MATRIX RAIN
       ========================================================== */
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array.from({ length: columns }).fill(canvas.height);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#005500'; // Darker green so terminal text pops
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < drops.length; i++) {
        const text = chars.charAt(Math.floor(Math.random() * chars.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(drawMatrix, 35);

    /* ==========================================================
       2. HOLLYWOOD TERMINAL (Left Panel)
       ========================================================== */
    const terminal = document.getElementById('terminal');
    let maxLines = Math.floor(window.innerHeight / 20) - 6; 
    
    const sysLogs = [
      "BYPASSING KERNEL SECURITY...", "REROUTING EXELIS MAINFRAME...",
      "EXTRACTING ENCRYPTED PACKETS...", "INJECTING GALAXY_DESIGN_PROTOCOL...",
      "COMPILING PAYLOAD: PRINCE_0X99...", "PINGING REMOTE SATELLITE T-800...",
      "MASKING IP ADDRESS [PROXIES: 12]..."
    ];

    function randomHex() {
      let hex = "";
      for(let i=0; i<8; i++) hex += Math.floor(Math.random()*16).toString(16).toUpperCase();
      return "0x" + hex;
    }

    function addLog(html) {
      const line = document.createElement('div');
      line.className = 'log-line'; line.innerHTML = html;
      terminal.appendChild(line);
      while (terminal.childElementCount > maxLines) terminal.removeChild(terminal.firstChild);
    }

    function runTerminal() {
      const r = Math.random();
      let out = "";
      if (r < 0.08) out = `<span class="log-crit">[BREACH] FIREWALL WALL COMPROMISED. DEPLOYING COUNTERMEASURES.</span>`;
      else if (r < 0.15) out = `<span class="log-warn">[WARN] PACKET LOSS DETECTED ON NODE 4...</span>`;
      else if (r < 0.4) out = `<span class="log-sys">[OK] ${sysLogs[Math.floor(Math.random() * sysLogs.length)]}</span>`;
      else {
        let dump = "";
        for(let i=0; i<8; i++) dump += randomHex() + " ";
        out = `<span class="log-hex">${dump}</span>`;
      }
      addLog(out);
      setTimeout(runTerminal, r < 0.6 ? Math.random()*50 + 10 : Math.random()*300 + 50);
    }
    setTimeout(runTerminal, 1000);

    /* ==========================================================
       3. SIDEBAR MODULES SCRIPTING
       ========================================================== */
    // Clock
    setInterval(() => {
      const d = new Date();
      document.getElementById('clock').innerText = d.toLocaleTimeString('en-US', {hour12: false}) + "." + Math.floor(d.getMilliseconds()/100);
    }, 100);

    // Hardware Stats Updater
    setInterval(() => {
      let cpu = Math.floor(Math.random() * 40) + 50; // 50-90%
      let ram = Math.floor(Math.random() * 20) + 75; // 75-95%
      let net = Math.floor(Math.random() * 100);

      document.getElementById('cpuBar').style.width = cpu + '%';
      document.getElementById('cpuTxt').innerText = cpu + '%';
      if(cpu > 80) document.getElementById('cpuBar').classList.add('danger');
      else document.getElementById('cpuBar').classList.remove('danger');

      document.getElementById('ramBar').style.width = ram + '%';
      document.getElementById('ramTxt').innerText = ram + '%';
      if(ram > 85) document.getElementById('ramBar').classList.add('danger');
      else document.getElementById('ramBar').classList.remove('danger');

      document.getElementById('netBar').style.width = net + '%';
      document.getElementById('netTxt').innerText = net + '%';
    }, 800);

    // Network IP Nodes
    const ipNodesDiv = document.getElementById('ipNodes');
    setInterval(() => {
      let html = "";
      for(let i=0; i<6; i++) {
        let ip = `192.168.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
        let ms = Math.floor(Math.random()*150) + 10;
        let status = ms > 100 ? `<span style="color:#ffcc00">WARN</span>` : `<span style="color:#0f0">OK</span>`;
        html += `<div>[${status}] ${ip} - ${ms}ms</div>`;
      }
      ipNodesDiv.innerHTML = html;
    }, 1500);

    // Brute Force Decryptor Effect
    const targetWord = "ROOT_ACCESS_GRANTED";
    const decryptBox = document.getElementById('decryptor');
    const statusBox = document.getElementById('decryptStatus');
    let decryptChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*";
    let iteration = 0;
    
    function runDecryptor() {
      let currentString = "";
      for(let i=0; i<targetWord.length; i++) {
        if(i < iteration / 3) {
          currentString += targetWord[i];
        } else {
          currentString += decryptChars[Math.floor(Math.random() * decryptChars.length)];
        }
      }
      decryptBox.innerText = currentString;
      
      if(iteration < targetWord.length * 3) {
        iteration++;
        setTimeout(runDecryptor, 50);
      } else {
        decryptBox.style.color = "#0f0";
        decryptBox.style.border = "1px solid #0f0";
        decryptBox.style.background = "rgba(0,255,0,0.1)";
        statusBox.innerText = "ACCESS SECURED";
        statusBox.style.color = "#0f0";
        
        // Reset after 5 seconds
        setTimeout(() => {
          iteration = 0;
          decryptBox.style.color = "#ffcc00";
          decryptBox.style.border = "1px dashed #ffcc00";
          decryptBox.style.background = "rgba(255,204,0,0.05)";
          statusBox.innerText = "BRUTE-FORCING...";
          statusBox.style.color = "#ff0055";
          runDecryptor();
        }, 5000);
      }
    }
    runDecryptor();

    /* ==========================================================
       4. SECURITY (Disable Context/Shortcuts)
       ========================================================== */
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.onkeydown = e => {
      if(e.keyCode===123||(e.ctrlKey&&e.shiftKey&&(e.keyCode===73||e.keyCode===74))||(e.ctrlKey&&e.keyCode===85)||e.keyCode===44){
        e.preventDefault(); return false;
      }
    };
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      maxLines = Math.floor(window.innerHeight / 20) - 6;
    });

  </script>
</body>
</html>
